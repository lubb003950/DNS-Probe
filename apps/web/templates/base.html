<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DNS 探测系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body {% block body_data %}{% endblock %}>
    <!-- Topbar -->
    <header class="topbar">
        <button class="hamburger" id="sidebar-toggle" aria-label="展开导航菜单" aria-expanded="false">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <a class="brand" href="/dashboard">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-name">DNS 探测系统</span>
                <span class="brand-sub">江苏常熟农村商业银行</span>
            </div>
        </a>
        <div class="topbar-right">持续探测 · 实时告警 · 可视化管理</div>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="app-body">
        <!-- Sidebar -->
        {% set p = request.url.path %}
        <nav class="sidebar">
            <div class="nav-group-label">监控总览</div>
            <a href="/dashboard" class="nav-item {% if p == '/dashboard' or p == '/' %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="18" y="3" width="4" height="18" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="2" y="13" width="4" height="8" rx="1"/>
                    </svg>
                </span>Dashboard
            </a>

            <div class="nav-group-label">配置管理</div>
            <a href="/tasks" class="nav-item {% if p == '/tasks' or p.startswith('/tasks/') %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </span>探测任务
            </a>
            <a href="/dns-servers" class="nav-item {% if p == '/dns-servers' or p.startswith('/dns-servers/') %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/>
                    </svg>
                </span>DNS 服务器
            </a>

            <div class="nav-group-label">运行状态</div>
            <a href="/nodes" class="nav-item {% if p == '/nodes' %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
                    </svg>
                </span>探测节点
            </a>
            <a href="/alerts" class="nav-item {% if p == '/alerts' or p.startswith('/alerts/') %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </span>告警事件
            </a>

            <div class="sidebar-footer">
                江苏常熟农村商业银行<br>
                DNS 探测平台
            </div>
        </nav>

        <!-- Main content -->
        <main class="main-area">
            {% block breadcrumb %}{% endblock %}
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script>
    /* ── Toast 通知系统 ─────────────────────────── */
    window.showToast = function(msg, type, duration) {
        type = type || 'info';
        duration = duration || 4000;
        var container = document.getElementById('toast-container');
        if (!container) return;
        var el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = msg;
        el.addEventListener('click', function() { dismissToast(el); });
        container.appendChild(el);
        setTimeout(function() { dismissToast(el); }, duration);
    };
    function dismissToast(el) {
        if (el.classList.contains('toast-out')) return;
        el.classList.add('toast-out');
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 260);
    }

    /* 从 data 属性自动激活 Toast */
    document.addEventListener('DOMContentLoaded', function() {
        var body = document.body;
        var msg  = body.dataset.toastMsg;
        var type = body.dataset.toastType || 'success';
        if (msg) { window.showToast(msg, type); }
    });

    /* ── 相对时间 ────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function() {
        var now = Date.now();
        document.querySelectorAll('[data-ts]').forEach(function(el) {
            var raw = el.dataset.ts;
            if (!raw) return;
            /* 保留绝对时间作为 title */
            el.title = raw;
            /* 解析时间戳（北京时间字符串 → UTC ms） */
            var ms = Date.parse(raw.replace(' ', 'T') + '+08:00');
            if (isNaN(ms)) return;
            var diff = Math.round((now - ms) / 1000);
            var text;
            if (diff < 60)        text = diff + ' 秒前';
            else if (diff < 3600) text = Math.floor(diff / 60) + ' 分钟前';
            else if (diff < 86400)text = Math.floor(diff / 3600) + ' 小时前';
            else                  text = Math.floor(diff / 86400) + ' 天前';
            el.textContent = text;
        });
    });
    </script>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
