# Linux logrotate 配置
# 部署方法：
#   sudo cp scripts/logrotate_dns_probe.conf /etc/logrotate.d/dns-probe
#   sudo logrotate -d /etc/logrotate.d/dns-probe   # 测试（dry run）
#   sudo logrotate -f /etc/logrotate.d/dns-probe   # 强制执行一次
#
# 请将 /opt/dns_probe 替换为实际项目部署路径

/opt/dns_probe/data/logs/*.log {
    # 每天轮转
    daily

    # 保留 30 天
    rotate 30

    # 轮转后立即压缩（延迟一天，避免压缩正在写入的文件）
    compress
    delaycompress

    # 文件不存在时不报错
    missingok

    # 空文件不轮转
    notifempty

    # 轮转后创建新日志文件（权限 644，属主 root）
    create 0644 root root

    # 轮转后向进程发送 HUP 信号（不需要重启，Python 的 TimedRotatingFileHandler 自动处理）
    # postrotate
    #     systemctl reload dns-probe-api 2>/dev/null || true
    # endscript
}
